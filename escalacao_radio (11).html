<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escalação — Rádio SPFC</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #181818;
  --border: #252525;
  --border2: #303030;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --red: #c8001e;
  --red-bg: #1a0008;
  --red-light: #e8001e;
  --spfc-red: #c8001e;
  --spfc-white: #f5f5f5;
  --spfc-black: #0a0a0a;
  --green: #00aa55;
  --green-bg: #001a0f;
  --green-light: #00dd77;
  --amber: #cc8800;
  --amber-bg: #1a1100;
  --amber-light: #ffaa00;
  --blue: #0077cc;
  --blue-bg: #00111a;
  --blue-light: #33aaff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

/* LAYOUT */
.shell { display: flex; flex-direction: column; height: 100vh; }

/* TOP BAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; border-bottom: 3px solid var(--spfc-red);
  background: #000; flex-shrink: 0; height: 56px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-img { height: 38px; width: auto; object-fit: contain; display: block; }
.topbar-divider { width: 1px; height: 28px; background: #2a2a2a; }
.season { font-family: var(--mono); font-size: 10px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
.topbar-title { font-family: var(--mono); font-size: 11px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }
.topbar-right { display: flex; gap: 8px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px;
  font-family: var(--mono); font-size: 12px; font-weight: 500; border: 1px solid #333;
  background: transparent; color: #888; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
.btn:hover { border-color: #888; color: var(--text); }
.btn.primary { background: var(--spfc-red); border-color: var(--spfc-red); color: #fff; font-weight: 600; }
.btn.primary:hover { background: #e8001e; border-color: #e8001e; }
.btn.ghost { border-color: transparent; }
.btn.ghost:hover { border-color: #333; }

/* TOOLBAR */
.toolbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 20px;
  border-bottom: 1px solid var(--border); background: #0a0a0a; flex-shrink: 0; flex-wrap: wrap;
}
.toolbar-label { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-right: 4px; }
.filter-btn { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2); cursor: pointer; transition: all 0.12s; letter-spacing: 0.03em; }
.filter-btn:hover { color: var(--text); border-color: #555; }
.filter-btn.active { background: var(--spfc-red); color: #fff; border-color: var(--spfc-red); font-weight: 600; }
.toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.stats-bar { margin-left: auto; display: flex; gap: 16px; }
.stat { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.stat b { color: var(--text); font-weight: 600; }

/* TABLE WRAPPER */
.table-wrap { flex: 1; overflow: auto; background: #0c0c0c; }

/* TABLE */
table { width: 100%; border-collapse: collapse; min-width: 900px; }

/* STICKY HEADER */
thead th {
  position: sticky; top: 0; z-index: 10;
  background: #0a0a0a; border-bottom: 2px solid var(--spfc-red);
  padding: 10px 12px; text-align: left; font-family: var(--mono); font-size: 11px;
  font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
}
thead th:first-child { position: sticky; left: 0; z-index: 20; width: 160px; min-width: 160px; }
thead th.member-col { text-align: center; min-width: 145px; max-width: 175px; }
thead th.act-col { text-align: center; width: 80px; }

/* MEMBER HEADER */
.member-th { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 0; }
.member-th .name { font-size: 13px; color: #f0f0f0; font-weight: 600; letter-spacing: 0; text-transform: none; line-height: 1.2; }
.member-th .role-tag { font-size: 10px; padding: 2px 7px; background: #1a1a1a; color: #888; border: 1px solid #333; letter-spacing: 0.04em; border-radius: 2px; }
.member-th .imp-badge { font-size: 10px; padding: 2px 7px; background: #1a1100; color: #ffaa00; border: 1px solid #cc880066; border-radius: 2px; cursor: help; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ROWS */
tbody tr { border-bottom: 1px solid #222; transition: background 0.1s; background: #0e0e0e; }
tbody tr:hover { background: #151515; }
tbody tr.past { opacity: 0.5; }

/* STICKY FIRST COL */
tbody td:first-child {
  position: sticky; left: 0; z-index: 5;
  background: var(--surface); border-right: 1px solid var(--border2);
  min-width: 160px; max-width: 160px;
}
tbody tr:hover td:first-child { background: #1a1a1a; }

/* GAME CELL */
.game-cell { padding: 10px 12px; }
.game-vs { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
.game-meta { display: flex; flex-direction: column; gap: 2px; margin-top: 3px; }
.game-date { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.game-comp { font-family: var(--mono); font-size: 10px; color: var(--blue-light); }
.game-local { font-family: var(--mono); font-size: 10px; }
.loc-home { color: var(--green-light); }
.loc-away { color: var(--amber-light); }

/* SLOT CELL */
td.slot-cell { text-align: center; padding: 0; vertical-align: middle; border-right: 1px solid var(--border); }
.slot { display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 6px 6px 8px; min-height: 64px; transition: background 0.12s; position: relative; }
.slot-toggle { display: flex; flex-direction: column; align-items: center; cursor: pointer;
  padding: 6px 14px; border-radius: 4px; transition: background 0.12s; width: 100%; }
.slot-toggle:hover { background: rgba(255,255,255,0.07); }

/* SLOT STATES */
.slot.confirmed { background: rgba(200,0,30,0.08); }
.slot.confirmed .slot-toggle:hover { background: rgba(200,0,30,0.18); }
.slot.declined { background: rgba(60,60,60,0.15); }
.slot.declined .slot-toggle:hover { background: rgba(60,60,60,0.28); }
.slot.impedido { background: rgba(204,136,0,0.06); }

/* STATUS INDICATOR */
.status-icon { font-size: 16px; line-height: 1; }
.status-label { font-family: var(--mono); font-size: 10px; margin-top: 3px; font-weight: 600; letter-spacing: 0.04em; }
.confirmed .status-label { color: #ff1a35; }
.declined .status-label { color: #555; }
.idle .status-label { color: var(--text3); }
.impedido .status-label { color: var(--amber-light); }
.confirmed .status-icon { color: #ff1a35; }
.declined .status-icon { color: #444; }

/* FUNCTION TAG */
.fn-tag { font-family: var(--mono); font-size: 9px; padding: 1px 5px; margin-top: 2px;
  border: 1px solid; letter-spacing: 0.04em; }
.fn-narrador { border-color: #33aaff44; color: var(--blue-light); background: var(--blue-bg); }
.fn-comentarista { border-color: #9966ff44; color: #bb99ff; background: #110022; }
.fn-reporter { border-color: #ff996644; color: #ffaa77; background: #1a0900; }
.fn-live { border-color: #00dd7744; color: var(--green-light); background: var(--green-bg); }
.fn-producao { border-color: #aaaaaa44; color: #aaa; background: #111; }

/* OBS CELL */
.obs-cell { padding: 8px 10px; min-width: 160px; max-width: 200px; }
.obs-input { width: 100%; background: transparent; border: none; color: var(--text2);
  font-family: var(--mono); font-size: 11px; resize: none; outline: none; min-height: 40px; }
.obs-input::placeholder { color: var(--text3); }
.obs-input:focus { color: var(--text); }

/* ACT CELL */
td.act-cell { text-align: center; padding: 8px; border-left: 1px solid var(--border2); }
.act-cell button { font-size: 12px; background: transparent; border: none; cursor: pointer; opacity: 0.4; transition: opacity 0.12s; }
.act-cell button:hover { opacity: 1; }

/* EMPTY ROW */
.empty-row td { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 12px; }

/* MODALS */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none;
  align-items: center; justify-content: center; z-index: 100; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2);
  padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text);
  margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.field { margin-bottom: 14px; }
.field label { display: block; font-family: var(--mono); font-size: 11px; color: var(--text3);
  letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
  font-family: var(--mono); font-size: 13px; padding: 8px 10px; outline: none; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--text3); }
.field select option { background: var(--surface2); }
.field textarea { resize: vertical; min-height: 60px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }

/* ROLE CHECKBOXES */
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.role-check { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  border: 1px solid var(--border); cursor: pointer; transition: border-color 0.12s; }
.role-check:hover { border-color: var(--text3); }
.role-check input { width: 14px; height: 14px; accent-color: var(--red-light); cursor: pointer; }
.role-check span { font-family: var(--mono); font-size: 11px; color: var(--text2); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* MEMBROS PANEL */
.membros-wrap { flex:1; overflow:auto; padding: 20px; background:#0c0c0c; }
.membros-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.membro-card { background: #111; border: 0.5px solid #2a2a2a; border-radius: 8px; overflow: hidden; }
.membro-card-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 0.5px solid #222; }
.membro-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-family: var(--mono); font-size: 12px; font-weight: 700; flex-shrink: 0; }
.av-narrador    { background: #0d2035; color: #5599dd; }
.av-reporter    { background: #0d2015; color: #44bb66; }
.av-comentarista{ background: #1a1030; color: #9977dd; }
.av-live        { background: #2a1010; color: #dd5555; }
.membro-info { flex:1; min-width:0; }
.membro-nome { font-size: 14px; font-weight: 600; color: #f0f0f0; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
.membro-grupo { font-family: var(--mono); font-size: 10px; color: #555; letter-spacing: 0.05em; margin-top: 2px; text-transform: uppercase; }
.membro-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.membro-field { display: flex; flex-direction: column; gap: 4px; }
.membro-field label { font-family: var(--mono); font-size: 10px; color: #555; letter-spacing: 0.05em; text-transform: uppercase; }
.membro-roles { display: flex; flex-wrap: wrap; gap: 5px; }
.role-pill { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 3px; cursor: pointer;
  border: 1px solid; transition: all 0.12s; user-select: none; }
.role-pill.on  { background: #c8001e22; color: #ff4444; border-color: #c8001e55; }
.role-pill.off { background: #1a1a1a; color: #555; border-color: #333; }
.role-pill:hover { opacity: 0.8; }
.membro-imp-row { display: flex; align-items: center; gap: 8px; }
.membro-imp-input { flex:1; background: #181818; border: 1px solid #333; color: #ccc;
  font-family: var(--mono); font-size: 11px; padding: 5px 8px; border-radius: 3px; outline:none; }
.membro-imp-input:focus { border-color: #555; }
.membro-imp-toggle { font-family: var(--mono); font-size: 10px; padding: 5px 10px; border-radius: 3px;
  border: none; cursor: pointer; font-weight: 600; transition: all 0.12s; flex-shrink: 0; }
.membro-imp-toggle.on  { background: #2a0a0a; color: #ff5555; border: 1px solid #aa222244; }
.membro-imp-toggle.off { background: #0a2a0a; color: #55cc77; border: 1px solid #22aa4444; }
.membro-imp-toggle:hover { opacity: 0.8; }
.membro-remove { font-family: var(--mono); font-size: 10px; padding: 4px 10px; background: transparent;
  border: 1px solid #2a2a2a; color: #555; border-radius: 3px; cursor: pointer; transition: all 0.12s; width:100%; margin-top:2px; }
.membro-remove:hover { border-color: #c8001e55; color: #ff4444; background: #1a0000; }
.membros-group-title { font-family: var(--mono); font-size: 11px; color: #444; letter-spacing: 0.08em;
  text-transform: uppercase; margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #1e1e1e; }
.membros-group-title:first-child { margin-top: 0; }

/* IMP TOGGLE BUTTON */
.imp-toggle { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border: none;
  border-radius: 3px; cursor: pointer; margin-top: 4px; font-weight: 600; letter-spacing: 0.03em;
  transition: all 0.15s; width: 100%; }
.imp-on { background: #2a0a0a; color: #ff4444; border: 1px solid #aa222244; }
.imp-on:hover { background: #3a0a0a; color: #ff6666; }
.imp-off { background: #0a1a0a; color: #44cc66; border: 1px solid #22aa4444; }
.imp-off:hover { background: #0a2a0a; color: #66ee88; }

/* LEGEND */
.legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--text3); }
.leg-dot { width: 8px; height: 8px; }
.leg-dot.g { background: #c8001e; }
.leg-dot.r { background: #444; }
.leg-dot.a { background: var(--amber); }
.leg-dot.n { background: var(--border2); }
</style>
</head>

  // ── JOGO 7: Mirassol 26/04 ──
  // Pré-jogo: Ilídio(1)
  // Narrador: Adauto(2)
  // Repórter: Leonardo(6)
  // Comentários: Fábio(8) e Ícaro Cruz(9)
  slots[7][1]  = {status:'confirmed', funcao:'live'};       // Ilídio - pré-jogo
  slots[7][2]  = {status:'confirmed', funcao:'narrador'};   // Adauto
  slots[7][6]  = {status:'confirmed', funcao:'reporter'};   // Leonardo
  slots[7][8]  = {status:'confirmed', funcao:'comentarista'}; // Fábio
  slots[7][9]  = {status:'confirmed', funcao:'comentarista'}; // Ícaro Cruz

  // ══════════════════════════════════════════════
  // BRASILEIRÃO 2026 — tabela CBF (jogos SPFC)
  // ══════════════════════════════════════════════
  const novosJogos = [
    { id:8,  adv:'Vitória',       comp:'Brasileirão 2026 — 11ª Rod. · Barradão',      data:'2026-04-11', hora:'16:30', local:'fora',    obs:'SÁBADO · Salvador BA' },
    { id:9,  adv:'Vasco da Gama', comp:'Brasileirão 2026 — 12ª Rod. · São Januário',  data:'2026-04-18', hora:'18:30', local:'fora',    obs:'SÁBADO · Rio de Janeiro RJ' },
    { id:10, adv:'Mirassol',      comp:'Brasileirão 2026 — 13ª Rod. · Morumbis',      data:'2026-04-25', hora:'21:00', local:'morumbi', obs:'SÁBADO · São Paulo SP' },
    { id:11, adv:'Bahia',         comp:'Brasileirão 2026 — 14ª Rod. · Morumbis',      data:'2026-05-03', hora:'16:00', local:'morumbi', obs:'DOMINGO · São Paulo SP' },
    { id:12, adv:'Corinthians',   comp:'Brasileirão 2026 — 15ª Rod. · Neo Química',   data:'2026-05-10', hora:'18:30', local:'fora',    obs:'DOMINGO · Clássico! São Paulo SP' },
    { id:13, adv:'Fluminense',    comp:'Brasileirão 2026 — 16ª Rod. · Maracanã',      data:'2026-05-16', hora:'20:30', local:'fora',    obs:'SÁBADO · Rio de Janeiro RJ' },
    { id:14, adv:'Botafogo',      comp:'Brasileirão 2026 — 17ª Rod. · Morumbis',      data:'2026-05-23', hora:'17:00', local:'morumbi', obs:'SÁBADO · São Paulo SP · TV: Globo + SporTV + Premiere' },
  ];
  novosJogos.forEach(g => {
    games.push(g);
    slots[g.id] = {};
    members.forEach(m => { slots[g.id][m.id] = { status:'idle', funcao:'' }; });
  });
  nextGId = 15;
}

// --- MODALS ---
function openModal(id) { document.getElementById('overlay-'+id).classList.add('open'); }
function closeModal(id) { document.getElementById('overlay-'+id).classList.remove('open'); }

function saveMember() {
  const nome = document.getElementById('m-nome').value.trim();
  if(!nome) return;
  const ini = document.getElementById('m-ini').value.trim().toUpperCase() || nome.slice(0,2).toUpperCase();
  const imp = document.getElementById('m-imp').value.trim();
  const roles = Array.from(document.querySelectorAll('#role-grid input:checked')).map(i=>i.value);
  const m = { id: nextMId++, nome, ini, roles, imp };
  members.push(m);
  // init slots for existing games
  games.forEach(g => {
    if(!slots[g.id]) slots[g.id] = {};
    slots[g.id][m.id] = { status: 'idle', funcao:'' };
  });
  document.getElementById('m-nome').value='';
  document.getElementById('m-ini').value='';
  document.getElementById('m-imp').value='';
  document.querySelectorAll('#role-grid input').forEach(i=>i.checked=false);
  closeModal('member');
  render();
}

function saveGame() {
  const adv = document.getElementById('g-adv').value.trim();
  if(!adv) return;
  const g = {
    id: nextGId++,
    adv,
    comp: document.getElementById('g-comp').value.trim() || '',
    data: document.getElementById('g-data').value,
    hora: document.getElementById('g-hora').value,
    local: document.getElementById('g-local').value,
    obs: document.getElementById('g-obs').value.trim(),
  };
  games.push(g);
  slots[g.id] = {};
  members.forEach(m => {
    slots[g.id][m.id] = { status: 'idle', funcao:'' };
  });
  document.getElementById('g-adv').value='';
  document.getElementById('g-comp').value='';
  document.getElementById('g-data').value='';
  document.getElementById('g-hora').value='';
  document.getElementById('g-obs').value='';
  closeModal('game');
  render();
}

function removeGame(id) {
  if(!confirm('Remover este jogo?')) return;
  games = games.filter(g=>g.id!==id);
  delete slots[id];
  render();
}

// --- SLOT TOGGLE ---
function cycleSlot(gId, mId) {
  const m = members.find(m=>m.id===mId);
  const s = slots[gId][mId];
  if(m && m.imp && s.status === 'idle') {
    const ok = confirm('⚠ ' + m.nome + ' tem impedimento:\n\n"' + m.imp + '"\n\nDeseja escalar mesmo assim?');
    if(!ok) return;
  }
  const idx = STATUS_CYCLE.indexOf(s.status);
  s.status = STATUS_CYCLE[(idx+1) % STATUS_CYCLE.length];
  if(s.status !== 'confirmed') s.funcao = '';
  render();
}

function toggleImp(mId) {
  const m = members.find(m => m.id === mId);
  if(!m) return;
  if(m.imp) {
    // liberar
    m._impBackup = m.imp;
    m.imp = '';
  } else {
    // bloquear — usa backup ou texto padrão
    m.imp = m._impBackup || 'Impedido';
  }
  render();
}

function setFuncao(gId, mId, val) {
  slots[gId][mId].funcao = val;
  render();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function updateObs(gId, val) {
  const g = games.find(g=>g.id===gId);
  if(g) g.obs = val;
}

// --- FORMAT ---
function fmtDate(d, h) {
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return day + ' ' + months[parseInt(m)-1] + (h ? ' · ' + h : '');
}

function statusIcon(s) {
  if(s==='confirmed') return { icon:'✓', label:'SIM', cls:'confirmed' };
  if(s==='declined')  return { icon:'✕', label:'NÃO', cls:'declined' };
  if(s==='impedido')  return { icon:'⚠', label:'IMP', cls:'impedido' };
  return { icon:'○', label:'—', cls:'idle' };
}

function fnTagHtml(funcao) {
  if(!funcao) return '';
  const map = { narrador:'fn-narrador', comentarista:'fn-comentarista', reporter:'fn-reporter', live:'fn-live', producao:'fn-producao', plantao:'fn-producao' };
  return `<span class="fn-tag ${map[funcao]||''}">${ROLES[funcao]||funcao}</span>`;
}

function buildFuncaoOptions(m, current) {
  let opts = `<option value="">função...</option>`;
  m.roles.forEach(r => {
    opts += `<option value="${r}" ${current===r?'selected':''}>${ROLES[r]}</option>`;
  });
  return opts;
}

function filteredGames() {
  if(filter==='todos') return games;
  if(filter==='morumbi') return games.filter(g=>g.local==='morumbi');
  if(filter==='pendente') return games.filter(g=>{
    const slotMap = slots[g.id]||{};
    return members.some(m => (slotMap[m.id]||{}).status==='idle');
  });
  if(filter==='completo') return games.filter(g=>{
    const slotMap = slots[g.id]||{};
    return members.every(m => (slotMap[m.id]||{}).status!=='idle');
  });
  return games;
}

// --- RENDER ---
function render() {
  const today = new Date().toISOString().slice(0,10);

  // header cols
  const thead = document.getElementById('thead-row');
  let thHtml = `<th>JOGO</th>`;
  const GROUP_COLORS = { narrador:'#1a3a5c', reporter:'#1a3320', comentarista:'#2a1a3a', live:'#2a1a1a' };
  const GROUP_LABEL = { narrador:'NARRADOR', reporter:'REPÓRTER', comentarista:'COMENTARISTA', live:'COMENT./APRES.' };
  members.forEach(m => {
    const primaryRole = m.roles[0] || '';
    const isImp = !!m.imp;
    const impNote = m.imp ? m.imp : '';
    const roleColor = GROUP_COLORS[primaryRole] || '#1a1a1a';
    const roleLabel = GROUP_LABEL[primaryRole] || primaryRole.toUpperCase();
    const impBadge = isImp
      ? `<div class="imp-badge" title="${impNote}">⚠ IMP</div>`
      : '';
    const toggleBtn = isImp
      ? `<button class="imp-toggle imp-on" onclick="toggleImp(${m.id})" title="Clique para liberar">🔴 Bloqueado</button>`
      : `<button class="imp-toggle imp-off" onclick="toggleImp(${m.id})" title="Clique para bloquear">🟢 Livre</button>`;
    thHtml += `<th class="member-col" style="background:${roleColor}22" id="th-member-${m.id}">
      <div class="member-th">
        <div class="name">${m.nome}</div>
        <div class="role-tag">${roleLabel}</div>
        ${impBadge}
        ${toggleBtn}
      </div>
    </th>`;
  });
  thHtml += `<th>OBS. DO JOGO</th><th class="act-col"></th>`;
  thead.innerHTML = `<tr>${thHtml}</tr>`;

  const fgames = filteredGames().sort((a,b)=>a.data>b.data?1:-1);
  const tbody = document.getElementById('tbody');

  if(!fgames.length || !members.length) {
    let msg = !members.length ? 'Adicione membros com o botão "+ Membro"' : 'Nenhum jogo encontrado.';
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${members.length+3}">${msg}</td></tr>`;
  } else {
    tbody.innerHTML = fgames.map(g => {
      const past = g.data < today;
      const localCls = g.local==='morumbi'?'loc-home':'loc-away';
      const localLabel = g.local==='morumbi'?'🏟 Morumbi':g.local==='fora'?'✈ Fora':'⚪ Neutro';

      let slotCells = '';
      members.forEach(m => {
        const sl = (slots[g.id]||{})[m.id] || {status:'idle',funcao:''};
        const st = statusIcon(sl.status);
        const funcaoSel = sl.status==='confirmed'
          ? `<select onchange="setFuncao(${g.id},${m.id},this.value)" onclick="event.stopPropagation()" style="margin-top:5px;font-family:var(--mono);font-size:11px;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:4px 6px;width:90%;cursor:pointer;border-radius:3px;">${buildFuncaoOptions(m,sl.funcao)}</select>`
          : fnTagHtml(sl.funcao);

        slotCells += `<td class="slot-cell">
          <div class="slot ${st.cls}">
            <div class="slot-toggle" onclick="cycleSlot(${g.id},${m.id})" title="${sl.status==='impedido'?m.imp:'Clique para alternar status'}">
              <div class="status-icon">${st.icon}</div>
              <div class="status-label">${st.label}</div>
            </div>
            ${funcaoSel}
          </div>
        </td>`;
      });

      return `<tr class="${past?'past':''}">
        <td>
          <div class="game-cell">
            <div class="game-vs">SPFC × ${g.adv}</div>
            <div class="game-meta">
              <span class="game-date">${fmtDate(g.data, g.hora)}</span>
              ${g.comp?`<span class="game-comp">${g.comp}</span>`:''}
              <span class="game-local ${localCls}">${localLabel}</span>
            </div>
          </div>
        </td>
        ${slotCells}
        <td class="slot-cell">
          <div class="obs-cell">
            <textarea class="obs-input" placeholder="obs..." onchange="updateObs(${g.id},this.value)">${g.obs||''}</textarea>
          </div>
        </td>
        <td class="act-cell">
          <button onclick="removeGame(${g.id})" title="Remover jogo">✕</button>
        </td>
      </tr>`;
    }).join('');
  }

  // stats
  let totalConf = 0;
  games.forEach(g => {
    members.forEach(m => {
      if((slots[g.id]||{})[m.id]?.status==='confirmed') totalConf++;
    });
  });
  document.getElementById('st-jogos').textContent = games.length;
  document.getElementById('st-membros').textContent = members.length;
  document.getElementById('st-conf').textContent = totalConf;
}

// --- VIEW SWITCHING ---
let currentView = 'jogos';
function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.toolbar .filter-btn[id^="view-"]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const isJogos = view === 'jogos';
  document.getElementById('view-jogos').style.display   = isJogos ? '' : 'none';
  document.getElementById('view-membros').style.display = isJogos ? 'none' : '';
  document.getElementById('sep-filter').style.display   = isJogos ? '' : 'none';
  document.getElementById('label-filter').style.display = isJogos ? '' : 'none';
  ['f-todos','f-pendente','f-completo','f-morumbi'].forEach(id => {
    document.getElementById(id).style.display = isJogos ? '' : 'none';
  });
  if(view === 'membros') renderMembros();
}

// --- RENDER MEMBROS ---
const ALL_ROLES = [
  {key:'narrador',     label:'Narrador'},
  {key:'reporter',     label:'Repórter'},
  {key:'comentarista', label:'Comentarista'},
  {key:'live',         label:'Apres. Live'},
  {key:'producao',     label:'Produção'},
  {key:'plantao',      label:'Plantão'},
];

const GROUPS = [
  { label: 'Narradores',                       filter: m => m.roles.includes('narrador') && !m.roles.includes('live') },
  { label: 'Repórteres',                        filter: m => m.roles.includes('reporter') },
  { label: 'Comentaristas',                     filter: m => m.roles.includes('comentarista') && !m.roles.includes('live') },
  { label: 'Comentaristas / Apresentadores',    filter: m => m.roles.includes('live') },
];

function avatarClass(m) {
  if(m.roles.includes('narrador')) return 'av-narrador';
  if(m.roles.includes('reporter')) return 'av-reporter';
  if(m.roles.includes('live'))     return 'av-live';
  return 'av-comentarista';
}

function grupoLabel(m) {
  if(m.roles.includes('narrador') && !m.roles.includes('live')) return 'NARRADOR';
  if(m.roles.includes('reporter')) return 'REPÓRTER';
  if(m.roles.includes('live'))     return 'COMENT. / APRES.';
  return 'COMENTARISTA';
}

function toggleMemberRole(mId, roleKey) {
  const m = members.find(x => x.id === mId);
  if(!m) return;
  const idx = m.roles.indexOf(roleKey);
  if(idx >= 0) m.roles.splice(idx, 1);
  else m.roles.push(roleKey);
  renderMembros();
  render(); // update main table headers too
}

function saveMemberImp(mId, val) {
  const m = members.find(x => x.id === mId);
  if(m) { m.imp = val; m._impBackup = val; render(); renderMembros(); }
}

function toggleMemberImpFromCard(mId) {
  const m = members.find(x => x.id === mId);
  if(!m) return;
  if(m.imp) { m._impBackup = m.imp; m.imp = ''; }
  else { m.imp = m._impBackup || 'Impedido'; }
  render();
  renderMembros();
}

function removeMemberFromCard(mId) {
  if(!confirm('Remover este membro?')) return;
  members = members.filter(x => x.id !== mId);
  render();
  renderMembros();
}

function renderMembros() {
  const panel = document.getElementById('membros-panel');
  if(!panel) return;
  let out = '';
  GROUPS.forEach(function(group) {
    const gMembers = members.filter(group.filter);
    if(!gMembers.length) return;
    out += '<div class="membros-group-title">' + group.label + '</div><div class="membros-grid">';
    gMembers.forEach(function(m) {
      const avCls = avatarClass(m);
      const grpLbl = grupoLabel(m);
      const isImp = !!m.imp;
      const pills = ALL_ROLES.map(function(r) {
        const on = m.roles.indexOf(r.key) >= 0;
        return '<span class="role-pill ' + (on?'on':'off') + '" onclick="toggleMemberRole(' + m.id + ',\'' + r.key + '\')">' + r.label + '</span>';
      }).join('');
      out += '<div class="membro-card">'
           + '<div class="membro-card-header">'
           + '<div class="membro-avatar ' + avCls + '">' + m.ini + '</div>'
           + '<div class="membro-info"><div class="membro-nome">' + m.nome + '</div><div class="membro-grupo">' + grpLbl + '</div></div>'
           + '<button class="membro-imp-toggle ' + (isImp?'on':'off') + '" onclick="toggleMemberImpFromCard(' + m.id + ')">' + (isImp?'🔴 Imp.':'🟢 Livre') + '</button>'
           + '</div>'
           + '<div class="membro-card-body">'
           + '<div class="membro-field"><label>Funções</label><div class="membro-roles">' + pills + '</div></div>'
           + '<div class="membro-field"><label>Impedimento / Obs.</label>'
           + '<input class="membro-imp-input" value="' + (m.imp||'').replace(/"/g,'&quot;') + '" placeholder="Ex: Indisponível noite..." onchange="saveMemberImp(' + m.id + ',this.value)" /></div>'
           + '<button class="membro-remove" onclick="removeMemberFromCard(' + m.id + ')">✕ Remover membro</button>'
           + '</div></div>';
    });
    out += '</div>';
  });
  panel.innerHTML = out;
}

seed();
render();
</script>
